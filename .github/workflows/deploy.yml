name: Build and Deploy to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Build React app
        run: npm run build

      - name: Deploy to Hostinger via rsync over SSH
        env:
          SSHPASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          sudo apt-get install -y sshpass rsync
          sshpass -e rsync -avz --delete -e "ssh -p ${{ secrets.FTP_PORT }} -o StrictHostKeyChecking=no" build/ ${{ secrets.FTP_USERNAME }}@${{ secrets.FTP_HOST }}:/domains/starthobby.hewsay.com/public_html/
